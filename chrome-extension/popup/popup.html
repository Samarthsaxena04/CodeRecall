<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeRecall</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ── LOGIN VIEW ──────────────────────────────────────────────── -->
  <div id="login-view" class="view" style="display: none;">
    <div class="header">
      <div class="logo-row">
        <img src="../icons/icon48.png" alt="CodeRecall" class="logo-img" />
        <span class="logo-text">CodeRecall</span>
      </div>
      <p class="subtitle">Sign in to track your revisions</p>
    </div>

    <div class="form-body">
      <button id="google-login-btn" class="btn-google">
        <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span>Continue with Google</span>
      </button>

      <div class="divider">
        <span>or sign in with email</span>
      </div>
    </div>

    <form id="login-form" class="form-body">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <p id="login-error" class="error-msg" style="display: none;"></p>
      <button type="submit" id="login-btn" class="btn-primary">
        <span class="btn-text">Sign In</span>
        <span class="btn-loading" style="display: none;">Signing in…</span>
      </button>
    </form>

    <div class="footer-link">
      <span class="muted">Don't have an account?</span>
      <a id="open-website-register" href="#" class="link">Create account on website →</a>
    </div>
  </div>

  <!-- ── MAIN VIEW ───────────────────────────────────────────────── -->
  <div id="main-view" class="view" style="display: none;">
    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <img src="../icons/icon48.png" alt="" class="topbar-logo" />
        <span class="topbar-title">CodeRecall</span>
      </div>
      <div class="topbar-right">
        <span id="user-name" class="user-chip"></span>
        <button id="logout-btn" class="btn-icon" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- Tab switcher -->
    <div class="tabs">
      <button class="tab active" data-tab="add">Add Question</button>
      <button class="tab" data-tab="due">
        Due Today <span id="due-badge" class="badge" style="display: none;">0</span>
      </button>
    </div>

    <!-- ── ADD TAB ─────────────────────────────────────────────── -->
    <div id="tab-add" class="tab-content active">
      <!-- Platform detection status -->
      <div id="detection-status" class="detection-bar">
        <span id="detection-icon" class="detection-icon">⏳</span>
        <span id="detection-text" class="detection-text">Checking page…</span>
      </div>

      <form id="add-form" class="form-body compact">
        <div class="field">
          <label for="q-title">Title</label>
          <input type="text" id="q-title" placeholder="e.g. Two Sum" required />
        </div>
        <div class="field">
          <label for="q-link">Link</label>
          <input type="url" id="q-link" placeholder="https://leetcode.com/problems/..." required />
        </div>
        <div class="field-row">
          <div class="field flex-1">
            <label for="q-platform">Platform</label>
            <select id="q-platform">
              <option value="LeetCode">LeetCode</option>
              <option value="Codeforces">Codeforces</option>
              <option value="CodeChef">CodeChef</option>
              <option value="HackerRank">HackerRank</option>
              <option value="HackerEarth">HackerEarth</option>
              <option value="GeeksforGeeks">GeeksforGeeks</option>
              <option value="AtCoder">AtCoder</option>
              <option value="TopCoder">TopCoder</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="q-tags">Tags <span class="muted">(comma separated)</span></label>
          <input type="text" id="q-tags" placeholder="array, dp, binary-search" />
        </div>
        <div class="field">
          <label for="q-notes">Notes <span class="muted">(optional)</span></label>
          <textarea id="q-notes" rows="2" placeholder="Key insights, approach…"></textarea>
        </div>

        <div class="status-picker">
          <label class="status-option solved">
            <input type="radio" name="status" value="done" checked />
            <span class="status-label">Solved</span>
          </label>
          <label class="status-option help">
            <input type="radio" name="status" value="help" />
            <span class="status-label">Needed Help</span>
          </label>
          <label class="status-option fail">
            <input type="radio" name="status" value="fail" />
            <span class="status-label">Unsolved</span>
          </label>
        </div>

        <p id="add-error" class="error-msg" style="display: none;"></p>
        <p id="add-success" class="success-msg" style="display: none;">Question saved! ✓</p>
        <button type="submit" id="add-btn" class="btn-primary">
          <span class="btn-text">Save Question</span>
          <span class="btn-loading" style="display: none;">Saving…</span>
        </button>
      </form>
    </div>

    <!-- ── DUE TAB ─────────────────────────────────────────────── -->
    <div id="tab-due" class="tab-content" style="display: none;">
      <div id="due-loading" class="center-msg">Loading revisions…</div>
      <div id="due-empty" class="center-msg" style="display: none;">
        <span class="emoji-big">🎉</span>
        <p>All caught up! No questions due today.</p>
      </div>
      <div id="due-list" class="due-list" style="display: none;"></div>
      <a id="open-dashboard" href="#" class="open-website-link">Open full dashboard →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
