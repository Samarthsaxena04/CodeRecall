<!DOCTYPE html>
<html>
<head><title>Generate CodeRecall Icons</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">
<h2>CodeRecall Icon Generator</h2>
<p>Click each button to download the icon at that size.</p>
<canvas id="canvas" width="128" height="128" style="display:none"></canvas>
<div style="display:flex;gap:12px;margin-top:20px">
  <button onclick="download(16)">Download 16x16</button>
  <button onclick="download(48)">Download 48x48</button>
  <button onclick="download(128)">Download 128x128</button>
</div>
<script>
function drawIcon(ctx, size) {
  // Background
  ctx.fillStyle = '#111827';
  const r = size * 0.18;
  roundRect(ctx, 0, 0, size, size, r);
  ctx.fill();

  // Center circle (brain/code symbol)
  const cx = size / 2, cy = size / 2;
  const cr = size * 0.32;

  // Gradient circle
  const grad = ctx.createLinearGradient(cx - cr, cy - cr, cx + cr, cy + cr);
  grad.addColorStop(0, '#60a5fa');
  grad.addColorStop(1, '#a78bfa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, cr, 0, Math.PI * 2);
  ctx.fill();

  // Code brackets "{ }"
  ctx.fillStyle = '#111827';
  ctx.font = `bold ${size * 0.32}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('{ }', cx, cy + size * 0.02);

  // Refresh arrow (small arc at bottom)
  ctx.strokeStyle = '#60a5fa';
  ctx.lineWidth = size * 0.04;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, cy + cr + size * 0.08, size * 0.06, Math.PI * 0.2, Math.PI * 1.6);
  ctx.stroke();
  // Arrow head
  const ax = cx + size * 0.055;
  const ay = cy + cr + size * 0.035;
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax + size * 0.03, ay + size * 0.04);
  ctx.lineTo(ax - size * 0.02, ay + size * 0.03);
  ctx.fillStyle = '#60a5fa';
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function download(size) {
  const canvas = document.getElementById('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  drawIcon(ctx, size);

  const link = document.createElement('a');
  link.download = 'icon' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
